services:
  - type: web
    name: tuit-olympiad
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SQLITE_DB_PATH
        value: /data/olimpiada.db
    disk:
      name: olimpiada-data
      mountPath: /data
      sizeGB: 1
    autoDeploy: true