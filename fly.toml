# fly.toml app configuration file generated for tuit-olympiad on 2026-04-10T08:50:00Z by 'flyctl launch'

app = "tuit-olympiad"
primary_region = "fra"

[build]
  image = "tuit-olympiad:latest"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "performance"
  cpus = 1
  memory_gb = 1

[checks]
  [checks.tcp]
    grace_period = "5s"
    interval = "15s"
    timeout = "5s"
