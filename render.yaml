services:
  - type: web
    name: tuit-olympiad
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false  # IMPORTANT: Set this in Render dashboard
      - key: ADMIN_USER
        sync: false  # Set admin username in Render dashboard
      - key: ADMIN_PASS
        sync: false  # Set strong admin password in Render dashboard (min 12 chars)
      - key: SESSION_SECRET
        sync: false  # Set long random secret in Render dashboard (min 32 chars)
      - key: REGISTRATION_OPEN
        sync: false  # Set "false" to close registration
    disk:
      name: olimpiada-data
      mountPath: /data
      sizeGB: 1
    autoDeploy: true